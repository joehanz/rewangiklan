<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iklan Baris Online</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
}

header{
padding:20px;
text-align:center;
background:#111827;
position:sticky;
top:0;
z-index:99;
}

header h1{
margin:0;
font-size:20px;
}

.search{
margin-top:10px;
}

.search input{
width:90%;
max-width:500px;
padding:10px;
border:none;
outline:none;
border-radius:8px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card h3{
margin:0 0 10px;
font-size:16px;
}

.card p{
font-size:14px;
opacity:.9;
}

.price{
margin:10px 0;
font-weight:bold;
color:#22c55e;
font-size:18px;
}

.btn{
display:inline-block;
padding:8px 12px;
background:#22c55e;
color:#000;
border-radius:8px;
text-decoration:none;
font-weight:bold;
font-size:13px;
}

.fab{
position:fixed;
right:20px;
bottom:20px;
background:#3b82f6;
color:#fff;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.loading{
padding:30px;
text-align:center;
}

footer{
padding:20px;
text-align:center;
font-size:12px;
opacity:.7;
}
</style>
</head>

<body>

<header>
<h1>📢 Iklan Baris Online</h1>

<div class="search">
<input type="text" id="searchInput" placeholder="Cari iklan...">
</div>

</header>

<div class="container" id="listIklan">

<div class="loading">
Memuat iklan...
</div>

</div>

<a class="fab" href="pasang.html">
+ Pasang Iklan
</a>

<footer>
© 2026 Iklan Baris Online
</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxNGhXnknPcj-9sAPNVlI8qip35R-ftTbbVCgV5g6LUdSwruMqcPHl_ug69J9AGhv3x/exec";

let semuaIklan = [];

async function loadIklan(){

try{

const res = await fetch(API_URL);
const data = await res.json();

semuaIklan = data.reverse();

renderIklan(semuaIklan);

}catch(err){

console.error(err);

document.getElementById("listIklan").innerHTML =
"<div class='loading'>Gagal memuat iklan</div>";

}

}

function renderIklan(data){

const list = document.getElementById("listIklan");

if(data.length===0){

list.innerHTML =
"<div class='loading'>Belum ada iklan</div>";

return;

}

list.innerHTML = "";

data.forEach(item=>{

let wa = String(item.wa || "")
.replace(/\D/g,'');

if(wa.startsWith("0")){
wa = "62" + wa.substring(1);
}

list.innerHTML += `
<div class="card">

<h3>${item.judul || "-"}</h3>

<p>${item.deskripsi || "-"}</p>

<div class="price">
Rp ${Number(item.harga || 0).toLocaleString("id-ID")}
</div>

<p>
Kategori:
<b>${item.kategori || "-"}</b>
</p>

<a
class="btn"
href="https://wa.me/${wa}"
target="_blank">
Chat WhatsApp
</a>

</div>
`;

});

}

document
.getElementById("searchInput")
.addEventListener("input",function(){

const keyword =
this.value.toLowerCase();

const hasil =
semuaIklan.filter(item=>{

return (
(item.judul || "")
.toLowerCase()
.includes(keyword)

||

(item.deskripsi || "")
.toLowerCase()
.includes(keyword)

||

(item.kategori || "")
.toLowerCase()
.includes(keyword)

);

});

renderIklan(hasil);

});

loadIklan();

</script>

</body>
</html>
