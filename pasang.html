<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pasang Iklan Gratis</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f4f7fb;
color:#1f2937;
}

.header{
background:#fff;
padding:18px 20px;
box-shadow:0 2px 15px rgba(0,0,0,.05);
position:sticky;
top:0;
z-index:999;
}

.header-inner{
max-width:900px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo h1{
font-size:22px;
font-weight:800;
}

.back-btn{
text-decoration:none;
background:#2563eb;
color:#fff;
padding:10px 18px;
border-radius:12px;
font-weight:700;
}

.wrapper{
max-width:900px;
margin:30px auto;
padding:0 15px;
}

.card{
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.title{
margin-bottom:25px;
}

.title h2{
font-size:30px;
font-weight:800;
margin-bottom:8px;
}

.title p{
color:#64748b;
}

.group{
margin-bottom:18px;
}

label{
display:block;
font-weight:700;
margin-bottom:8px;
}

input,
select,
textarea{

width:100%;

padding:14px;

border:1px solid #dbe3ef;

border-radius:14px;

font-size:15px;

outline:none;

transition:.3s;
}

input:focus,
select:focus,
textarea:focus{

border-color:#2563eb;

box-shadow:
0 0 0 4px
rgba(37,99,235,.12);

}

textarea{
height:140px;
resize:vertical;
}

.previewHarga{

margin-top:8px;

font-weight:700;

color:#16a34a;
}

.btn{

width:100%;

height:54px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:#fff;

font-size:16px;

font-weight:800;

cursor:pointer;

transition:.3s;
}

.btn:hover{

transform:
translateY(-2px);

}

.btn:disabled{

opacity:.7;

cursor:not-allowed;

}

.toast{

position:fixed;

right:20px;

bottom:20px;

background:#16a34a;

color:#fff;

padding:15px 20px;

border-radius:14px;

font-weight:700;

display:none;

box-shadow:
0 10px 25px rgba(0,0,0,.15);

}

@media(max-width:768px){

.card{
padding:20px;
}

.title h2{
font-size:24px;
}

.logo h1{
font-size:18px;
}

.back-btn{
padding:9px 14px;
}

}

</style>
</head>
<body>

<header class="header">

<div class="header-inner">

<div class="logo">
<div>📢</div>
<h1>Pasang Iklan</h1>
</div>

<a href="index.html" class="back-btn">
← Kembali
</a>

</div>

</header>

<div class="wrapper">

<div class="card">

<div class="title">

<h2>Pasang Iklan Gratis</h2>

<p>
Isi data di bawah ini.
Iklan akan langsung tampil di marketplace.
</p>

</div>

<form id="iklanForm">

<div class="group">
<label>Nama Pengiklan</label>
<input
type="text"
id="nama"
required>
</div>

<div class="group">
<label>Nomor WhatsApp</label>
<input
type="tel"
id="wa"
placeholder="08123456789"
required>
</div>

<div class="group">
<label>Kategori</label>

<select id="kategori" required>

<option value="">
Pilih Kategori
</option>

<option>tanah</option>
<option>rumah</option>
<option>ruko</option>
<option>kontrakan</option>
<option>kos</option>

<option>mobil</option>
<option>motor</option>
<option>sparepart</option>

<option>hp</option>
<option>laptop</option>
<option>komputer</option>
<option>tv</option>

<option>fashion</option>

<option>makanan</option>
<option>minuman</option>
<option>catering</option>

<option>ayam</option>
<option>bebek</option>
<option>telur</option>

<option>jasa</option>
<option>arsitek</option>
<option>kontraktor</option>
<option>desain</option>
<option>servis</option>

<option>lowongan</option>

<option>lainnya</option>

</select>

</div>

<div class="group">

<label>Judul Iklan</label>

<input
type="text"
id="judul"
required>

</div>

<div class="group">

<label>Harga</label>

<input
type="number"
id="harga"
required>

<div
class="previewHarga"
id="previewHarga">

Rp 0

</div>

</div>

<div class="group">

<label>Deskripsi</label>

<textarea
id="deskripsi"
required></textarea>

</div>

<button
type="submit"
class="btn"
id="submitBtn">

KIRIM IKLAN

</button>

</form>

</div>

</div>

<div
class="toast"
id="toast">

Iklan berhasil dikirim

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxNGhXnknPcj-9sAPNVlI8qip35R-ftTbbVCgV5g6LUdSwruMqcPHl_ug69J9AGhv3x/exec";

const form =
document.getElementById(
"iklanForm"
);

const hargaInput =
document.getElementById(
"harga"
);

const previewHarga =
document.getElementById(
"previewHarga"
);

const submitBtn =
document.getElementById(
"submitBtn"
);

const toast =
document.getElementById(
"toast"
);

hargaInput.addEventListener(
"input",
()=>{

previewHarga.innerHTML =

"Rp " +

Number(
hargaInput.value || 0
).toLocaleString(
"id-ID"
);

}
);

form.addEventListener(
"submit",
function(e){

e.preventDefault();

submitBtn.disabled = true;

submitBtn.innerHTML =
"Mengirim...";

const data = {

nama:
document.getElementById("nama").value,

wa:
document.getElementById("wa").value,

judul:
document.getElementById("judul").value,

deskripsi:
document.getElementById("deskripsi").value,

harga:
document.getElementById("harga").value,

kategori:
document.getElementById("kategori").value

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data),
headers:{
"Content-Type":
"text/plain;charset=utf-8"
},
mode:"no-cors"
});

toast.style.display =
"block";

setTimeout(()=>{

window.location.href =
"index.html";

},2000);

});

</script>

</body>
</html>
