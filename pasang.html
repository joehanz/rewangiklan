<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pasang Iklan Gratis</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="top-header">

<div class="logo-box">

<h1>IKLAN BARIS</h1>

<p>Pasang Gratis, Jual Cepat!</p>

</div>

<a
href="index.html"
class="post-btn"
>

KEMBALI KE BERANDA

</a>

</header>

<div class="form-page">

<div class="form-card">

<h2>

PASANG IKLAN GRATIS

</h2>

<form id="adForm">

<div class="form-group">

<label>
Judul Iklan
</label>

<input
type="text"
id="title"
maxlength="80"
required
>

</div>

<div class="form-group">

<label>
Kategori
</label>

<select
id="category"
required
>

<option value="">
Pilih Kategori
</option>

<option>
Elektronik
</option>

<option>
Kendaraan
</option>

<option>
Properti
</option>

<option>
Lowongan
</option>

<option>
Hobi
</option>

<option>
Jasa
</option>

<option>
Hewan
</option>

<option>
Lainnya
</option>

</select>

</div>

<div class="form-group">

<label>
Lokasi
</label>

<input
type="text"
id="location"
required
>

</div>

<div class="form-group">

<label>
Nomor WhatsApp
</label>

<input
type="text"
id="whatsapp"
required
>

</div>

<div class="form-group">

<label>
Deskripsi Iklan
</label>

<textarea
id="description"
maxlength="250"
required
></textarea>

<div
id="charCount"
class="char-count"
>

0 / 250

</div>

</div>

<div class="form-group">

<label>
Foto Produk
</label>

<input
type="file"
id="imageInput"
accept="image/*"
required
>

<p class="help">

JPG / PNG akan otomatis
diubah menjadi WebP dan
dikompres sebelum upload.

</p>

</div>

<div
id="previewBox"
class="preview-box"
>

<img
id="previewImage"
>

</div>

<button
type="submit"
class="submit-btn"
>

PASANG IKLAN

</button>

</form>

<div
id="statusBox"
class="status-box"
>

</div>

</div>

</div>

<script>

/* =========================
CONFIG
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbxNGhXnknPcj-9sAPNVlI8qip35R-ftTbbVCgV5g6LUdSwruMqcPHl_ug69J9AGhv3x/exec";

/* =========================
CHAR COUNT
========================= */

const desc =
document.getElementById(
"description"
);

const count =
document.getElementById(
"charCount"
);

desc.addEventListener(
"input",
()=>{

count.textContent =
desc.value.length +
" / 250";

}
);

/* =========================
PREVIEW
========================= */

let imageBase64 = "";

document
.getElementById(
"imageInput"
)
.addEventListener(
"change",
handleImage
);

async function handleImage(e){

const file =
e.target.files[0];

if(!file)
return;

const webp =
await convertToWebP(
file
);

imageBase64 =
webp;

document
.getElementById(
"previewImage"
)
.src = webp;

}

/* =========================
WEBP CONVERT
========================= */

function convertToWebP(file){

return new Promise(
(resolve)=>{

const reader =
new FileReader();

reader.onload =
function(ev){

const img =
new Image();

img.onload =
function(){

let width =
img.width;

let height =
img.height;

const max =
1200;

if(width > max){

height =
(height * max)
/
width;

width =
max;

}

const canvas =
document.createElement(
"canvas"
);

canvas.width =
width;

canvas.height =
height;

const ctx =
canvas.getContext(
"2d"
);

ctx.drawImage(
img,
0,
0,
width,
height
);

const data =
canvas.toDataURL(
"image/webp",
0.75
);

resolve(data);

};

img.src =
ev.target.result;

};

reader.readAsDataURL(
file
);

}
);

}

/* =========================
SUBMIT
========================= */

document
.getElementById(
"adForm"
)
.addEventListener(
"submit",
submitAd
);

async function submitAd(e){

e.preventDefault();

const status =
document.getElementById(
"statusBox"
);

status.innerHTML =
"Mengirim iklan...";

const payload = {

title:
document.getElementById(
"title"
).value,

category:
document.getElementById(
"category"
).value,

location:
document.getElementById(
"location"
).value,

whatsapp:
document.getElementById(
"whatsapp"
).value,

description:
document.getElementById(
"description"
).value,

image:
imageBase64,

date:
new Date().toISOString()

};

try{

const res =
await fetch(
API_URL,
{
method:"POST",
body:JSON.stringify(
payload
)
}
);

const result =
await res.text();

status.innerHTML =
"Iklan berhasil dipasang.";

document
.getElementById(
"adForm"
)
.reset();

document
.getElementById(
"previewImage"
)
.src = "";

count.textContent =
"0 / 250";

}
catch(err){

status.innerHTML =
"Gagal mengirim iklan.";

console.error(
err
);

}

}

</script>

</body>
</html>
